name: Bake tiles → GitHub Releases

# Triggered manually via `gh workflow run bake-all.yml -f limit=1000`
# or via the GitHub UI on the Actions tab.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Top-N tiles to bake (sorted by importance in tiles.geojson)"
        type: number
        default: 1000
      batch_size:
        description: "Tiles per parallel runner (smaller = more parallelism)"
        type: number
        default: 50
      admin1_filter:
        description: "Comma-separated admin1 codes to include (e.g. 'WLS,SCT'). Empty = ENG+WLS+SCT."
        type: string
        default: ""
      use_coverage_index:
        description: "Filter tiles to those confirmed covered by LIDAR (uses data/coverage_index.json). Strongly recommended for SCT runs."
        type: boolean
        default: true
      skip_baked_tags:
        description: "Comma-separated release tags whose tiles are already baked — they'll be excluded so this run targets only NEW tiles."
        type: string
        default: ""

# `gh release` calls inside the workflow need write access on the
# repo's contents. The default GITHUB_TOKEN has read on contents — bump
# it to write here.
permissions:
  contents: write

jobs:
  prep:
    name: Prep — compute batches + create release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
      batches:     ${{ steps.split.outputs.batches }}
      n_tiles:     ${{ steps.split.outputs.n_tiles }}
      n_batches:   ${{ steps.split.outputs.n_batches }}
      batch_size:  ${{ steps.split.outputs.batch_size }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compute batch matrix
        id: split
        run: |
          COV_FLAG=""
          if [ "${{ inputs.use_coverage_index }}" = "true" ] && [ -f data/coverage_index.json ]; then
            COV_FLAG="--coverage-index data/coverage_index.json"
          fi
          OUT=$(python3 src/split_batches.py \
            --tiles data/tiles.geojson \
            --limit ${{ inputs.limit }} \
            --batch-size ${{ inputs.batch_size }} \
            --admin1 "${{ inputs.admin1_filter }}" \
            $COV_FLAG \
            --skip-baked-tags "${{ inputs.skip_baked_tags }}")
          echo "Split output: $OUT"
          # Push each top-level key from the JSON onto GITHUB_OUTPUT.
          echo "batches=$(echo "$OUT" | jq -c .batches)"     >> $GITHUB_OUTPUT
          echo "n_tiles=$(echo "$OUT" | jq -r .n_tiles)"     >> $GITHUB_OUTPUT
          echo "n_batches=$(echo "$OUT" | jq -r .n_batches)" >> $GITHUB_OUTPUT
          echo "batch_size=$(echo "$OUT" | jq -r .batch_size)" >> $GITHUB_OUTPUT

      - name: Set release tag
        id: tag
        run: |
          TAG="bake-$(date -u +%Y-%m-%d)-${{ github.run_id }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Will create release: $TAG"

      - name: Create release (empty, to be filled by bake jobs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Tile bake — $(date -u +%Y-%m-%d) — top ${{ steps.split.outputs.n_tiles }}" \
            --notes "Auto-generated by .github/workflows/bake-all.yml run ${{ github.run_id }}.

          - Tiles requested: ${{ steps.split.outputs.n_tiles }}
          - Batches: ${{ steps.split.outputs.n_batches }} × ${{ steps.split.outputs.batch_size }} per runner
          - Manifest: \`manifest.json\` (added by the manifest job after bakes complete)
          - Per-tile asset naming: \`<tile_id>__city.{stl,glb}\`, \`<tile_id>__preview.png\`, \`<tile_id>__meta.json\`
          - Picker fetches from: \`releases/latest/download/manifest.json\`
          "

  bake:
    name: Bake batch ${{ matrix.batch_idx }}
    needs: prep
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch_idx: ${{ fromJson(needs.prep.outputs.batches) }}
      # Up to 20 runners in parallel — GH free tier limit for OSS repos.
      max-parallel: 20
      # One batch failing shouldn't kill the others.
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps (GDAL for rasterio)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgdal-dev gdal-bin

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Bake batch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COV_FLAG=""
          if [ "${{ inputs.use_coverage_index }}" = "true" ] && [ -f data/coverage_index.json ]; then
            COV_FLAG="--coverage-index data/coverage_index.json"
          fi
          python3 src/bake_batch.py \
            --tiles data/tiles.geojson \
            --limit ${{ needs.prep.outputs.n_tiles }} \
            --batch-size ${{ needs.prep.outputs.batch_size }} \
            --batch-idx ${{ matrix.batch_idx }} \
            --release-tag ${{ needs.prep.outputs.release_tag }} \
            --admin1 "${{ inputs.admin1_filter }}" \
            $COV_FLAG \
            --skip-baked-tags "${{ inputs.skip_baked_tags }}"

  manifest:
    name: Build manifest.json
    needs: [prep, bake]
    # Run even if some bake batches failed — manifest captures whatever made it.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build manifest.json from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 src/build_manifest.py \
            --tiles data/tiles.geojson \
            --release-tag ${{ needs.prep.outputs.release_tag }} \
            --repo ${{ github.repository }} \
            --out manifest.json

      - name: Upload manifest to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prep.outputs.release_tag }}" \
            manifest.json --clobber

      - name: Final summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Bake complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Release: \`${{ needs.prep.outputs.release_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tiles attempted: ${{ needs.prep.outputs.n_tiles }}" >> $GITHUB_STEP_SUMMARY
          MANIFEST_TILES=$(jq -r '.tile_count' manifest.json)
          echo "- Tiles in manifest: $MANIFEST_TILES" >> $GITHUB_STEP_SUMMARY
          echo "- Picker URL: https://github.com/${{ github.repository }}/releases/latest/download/manifest.json" >> $GITHUB_STEP_SUMMARY
